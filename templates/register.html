<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Join the Future</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1; 
            --accent-2: #a855f7; 
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 40px 20px;
        }

        .register-card {
            width: 100%;
            max-width: 550px;
            padding: 45px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .brand-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1.5px;
            text-align: center;
            display: block;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            text-align: center;
            margin-bottom: 40px;
        }

        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: block;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 18px;
            color: white;
            transition: 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
            color: white;
            outline: none;
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--accent), var(--accent-2));
            color: white;
            border: none;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-top: 15px;
        }

        .btn-register:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-text a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 700;
        }

        .custom-select-wrapper {
            position: relative;
            width: 100%;
        }

        select.form-control {
            appearance: none;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #ffffff !important;
            border-radius: 12px !important;
            padding: 12px 20px !important;
            cursor: pointer;
        }

        select option {
            background-color: #1a1a1a;
            color: white;
        }
    </style>
</head>
<body>

<div class="register-card">
    <span class="brand-logo">ZENITH</span>
    <p class="subtitle">Join thousands of scholars building the future.</p>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="background: rgba(255,0,0,0.1); border: 1px solid #f87171; color: #f87171; padding: 12px 20px; border-radius: 12px; margin-bottom: 20px; font-size: 0.9rem; text-align: center;">
                    ⚠️ {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
        <!-- Added ID to form -->
        <form action="{{ url_for('register') }}" method="POST" id="registrationForm">
            <div class="row g-3 mb-4">
                <div class="col-md-12">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Nandini Saraswat" required>
                </div>
                
                <div class="col-md-12">
                    <label class="form-label">College Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="scholar@university.edu" required>
                </div>

                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold text-uppercase" style="color: #94a3b8; letter-spacing: 1px;">
                        University / Institution
                    </label>
                    <div class="custom-select-wrapper">
                        <select class="form-control" id="university" name="university" required>
                            <option value="" disabled selected>Select your campus</option>
                            <option value="GLA University">GLA University</option>
                            <option value="IIT KANPUR">IIT KANPUR</option>
                            <option value="Other">Other Institution</option>
                        </select>
                    </div>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-control" placeholder="••••••••" required>
                </div>
            </div>

            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" required>
                <label class="form-check-label small text-secondary" for="terms">
                    I agree to the <a href="#">Terms of Collaboration</a>
                </label>
            </div>

            <button type="submit" class="btn-register">Initialize Journey →</button>
        </form>

        <div class="footer-text">
            Already a member? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>

    <!-- VALIDATION SCRIPT -->
    <script>
        document.getElementById('registrationForm').onsubmit = function(e) {
            const email = document.getElementById('email').value;
            const university = document.getElementById('university').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;

            // 1. Password Match Validation
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                e.preventDefault(); // Stop form submission
                return false;
            }

            // 2. Email Domain Validation
            if (university === "GLA University") {
                if (!email.endsWith("@gla.ac.in")) {
                    alert("Please use your GLA University email (@gla.ac.in)");
                    e.preventDefault();
                    return false;
                }
            } else if (university === "IIT KANPUR") {
                if (!email.endsWith("@kp.ac.in")) {
                    alert("Please use your IIT Kanpur email (@kp.ac.in)");
                    e.preventDefault();
                    return false;
                }
            }
            
            return true;
        };
    </script>

</body>
</html>
