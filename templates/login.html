<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Login</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1; /* Indigo glow */
        }

        body {
            background-color: var(--bg);
            /* Subtle background glow to match the dashboard */
            background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        /* The Login Card */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 10px;
            display: block;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        /* Form Inputs */
        .form-label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
            padding-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group-custom {
            margin-bottom: 20px;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px 20px;
            color: white;
            transition: 0.3s;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            color: white;
            outline: none;
        }

        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #ffffff;
            color: #000;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 255, 255, 0.1);
            background: #f8fafc;
        }

        /* Secondary Links */
        .footer-links {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #64748b;
        }

        .footer-links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Decorative "aura" circle */
        .aura {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="aura"></div>

    <div class="login-card">
        <span class="brand-logo">ZENITH</span>
        <p class="subtitle">Enter your credentials to continue your journey.</p>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="input-group-custom">
                <label class="form-label">College Email</label>
                <input type="email" name="email" class="form-control" placeholder="nandini@university.edu" required>
            </div>

            <div class="input-group-custom">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label small text-secondary" for="remember">Remember me</label>
                </div>
                <a href="#" class="small text-decoration-none" style="color: var(--accent)">Forgot?</a>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="footer-links">
            Don't have an account? <a href="{{ url_for('register') }}">Join Zenith</a>
        </div>
    </div>

</body>
</html>
