<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Propose Initiative</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #020203;
            --accent: #00f2ff;
            --purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .glow-sphere {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            filter: blur(50px);
            animation: float 10s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -20px); }
        }
        .proposal-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            margin: 40px 20px;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.desc { color: #94a3b8; margin-bottom: 35px; font-size: 0.95rem; }
        .form-group { margin-bottom: 22px; text-align: left; }
        label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin-bottom: 8px;
            opacity: 0.8;
        }
        input, textarea, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-size: 0.95rem;
            transition: 0.3s;
            box-sizing: border-box;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.08);
        }
        select option { background: #1a1a2e; color: white; }
        .btn-launch {
            width: 100%;
            background: white;
            color: black;
            border: none;
            padding: 18px;
            border-radius: 14px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-top: 15px;
        }
        .btn-launch:hover {
            transform: translateY(-2px);
            background: var(--accent);
            color: black;
            box-shadow: 0 15px 30px rgba(0, 242, 255, 0.2);
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #555;
            text-decoration: none;
            font-size: 0.85rem;
            transition: 0.3s;
        }
        .back-link:hover { color: white; }
        .flash-msg {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="glow-sphere"></div>

    <div class="proposal-container">
        <h1>New Initiative</h1>
        <p class="desc">Define the vision, recruit the best, change the ecosystem.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-msg">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/propose_project" method="POST">
            <div class="form-group">
                <label>Initiative Title</label>
                <input type="text" name="title" placeholder="e.g., Smart Campus AI" required>
            </div>

            <div class="form-group">
                <label>Vision Statement</label>
                <textarea name="description" rows="3" placeholder="What impact will this create?" required></textarea>
            </div>

            <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div>
                    <label>XP Goal</label>
                    <input type="number" name="xp" placeholder="500">
                </div>
                <div>
                    <label>World</label>
                    <select name="world">
                        <option value="tech">Tech Hub</option>
                        <option value="creative">Creative Studio</option>
                        <option value="research">Research Lab</option>
                        <option value="economy">Economy & Trade</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-launch">
                Launch Initiative <i data-lucide="zap"></i>
            </button>
        </form>

        <a href="/worlds" class="back-link">← Return to Worlds</a>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
