<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Reach Your Zenith</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #000000;
            --primary: #6366f1;
            --accent: #00d2ff;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mouse Spotlight Effect */
        .spotlight {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Big Aura Container */
        .hero-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
        }

        /* Massive Typography */
        .reach-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(5rem, 15vw, 12rem); /* Dynamic massive size */
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -5px;
            margin: 0;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .zenith-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(5rem, 15vw, 12rem);
            font-weight: 700;
            line-height: 0.8;
            letter-spacing: -5px;
            background: linear-gradient(to bottom, #fff 30%, #333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.1));
        }

        /* Floating Badge */
        .badge-live {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 0.8rem;
            letter-spacing: 3px;
            color: var(--primary);
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        /* The Button */
        .cta-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .btn-massive {
            background: #fff;
            color: #000;
            padding: 20px 60px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            border: 1px solid #fff;
        }

        .btn-massive:hover {
            background: transparent;
            color: #fff;
            transform: scale(1.1);
            letter-spacing: 2px;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }

        .scroll-hint {
            color: #444;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="spotlight"></div>

    <div class="hero-container">
        <div class="badge-live">10+ SCHOLARS ACTIVE</div>
        
        <h1 class="reach-text">Reach</h1>
        <h1 class="zenith-text">Your Zenith</h1>

        <div class="cta-container">
            <p class="text-secondary mb-4" style="max-width: 500px; margin: 0 auto;">
                The elite collaboration engine for the next generation of engineers, designers, and researchers.
            </p>
            <a href="{{ url_for('register') }}" class="btn-massive">INITIALIZE JOURNEY</a>
            <div class="scroll-hint">Ready to build?</div>
        </div>
    </div>

    <script>
        // Spotlight interaction
        const spotlight = document.querySelector('.spotlight');
        window.addEventListener('mousemove', e => {
            spotlight.style.setProperty('--x', `${e.clientX}px`);
            spotlight.style.setProperty('--y', `${e.clientY}px`);
        });
    </script>

</body>
</html>
