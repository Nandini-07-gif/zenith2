<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Elite Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #050505;
            --accent-1: #ff007a; /* Neon Pink */
            --accent-2: #00f2ff; /* Cyber Cyan */
            --accent-3: #7000ff; /* Deep Purple */
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- THE POPPY FLOATING LAYER --- */
        .sticker-field {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .sticker {
            position: absolute;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            animation: pop-float 12s infinite ease-in-out;
            opacity: 0.6;
        }

        @keyframes pop-float {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            33% { transform: translate(30px, -50px) rotate(15deg) scale(1.1); }
            66% { transform: translate(-20px, 20px) rotate(-10deg) scale(0.9); }
        }

        /* --- MOUSE GLOW AURA --- */
        #cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        /* --- CONTENT DESIGN --- */
        .hero {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .status-badge {
            background: linear-gradient(90deg, var(--accent-3), var(--accent-1));
            padding: 2px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 20px;
            animation: pulse-border 2s infinite;
        }

        .status-inner {
            background: var(--bg);
            padding: 6px 20px;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        h1 {
            font-size: 8rem;
            font-weight: 800;
            line-height: 0.85;
            letter-spacing: -5px;
            margin: 0;
            background: linear-gradient(180deg, #fff 40%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 span {
            display: block;
            color: #fff;
            -webkit-text-fill-color: white;
            opacity: 0.9;
        }

        .tagline {
            color: #888;
            margin: 30px 0;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* --- THE ADVANCED BUTTON --- */
        .btn-zenith {
            position: relative;
            background: #fff;
            color: #000;
            padding: 22px 50px;
            border-radius: 15px;
            font-weight: 800;
            text-decoration: none;
            text-transform: uppercase;
            overflow: hidden;
            transition: 0.3s;
            display: inline-block;
        }

        .btn-zenith:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.4);
        }

        .btn-zenith::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(transparent, transparent, var(--accent-2), transparent);
            animation: rotate-border 4s linear infinite;
            z-index: -1;
        }

        @keyframes rotate-border {
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(112, 0, 255, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(112, 0, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(112, 0, 255, 0); }
        }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <div class="sticker-field" id="field"></div>

    <div class="hero">
        <div class="status-badge">
            <div class="status-inner">10+ Scholars Active</div>
        </div>
        
        <h1>REACH<span>Your Zenith</span></h1>
        
        <p class="tagline">The elite collaboration engine for the next generation.</p>

        <a href="/login" class="btn-zenith">INITIALIZE JOURNEY</a>
    </div>

    <script>
        const field = document.getElementById('field');
        const icons = ['atom', 'microscope', 'rocket', 'brain-circuit', 'component', 'flask-conical', 'binary', 'cpu'];
        const colors = ['#ff007a', '#00f2ff', '#7000ff', '#ffffff'];

        // Generate Poppy Stickers
        for (let i = 0; i < 15; i++) {
            const div = document.createElement('div');
            div.className = 'sticker';
            const icon = icons[Math.floor(Math.random() * icons.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            div.style.left = Math.random() * 90 + '%';
            div.style.top = Math.random() * 90 + '%';
            div.style.color = color;
            div.style.animationDelay = (Math.random() * 5) + 's';
            div.style.animationDuration = (8 + Math.random() * 10) + 's';
            
            div.innerHTML = `<i data-lucide="${icon}" size="${24 + Math.random() * 40}"></i>`;
            field.appendChild(div);
        }

        lucide.createIcons();

        // Cursor Glow Follow
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
    </script>
</body>
</html>
