<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenith | Choose Your Niche</title>
   
    <!-- External Resources -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030303;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Floating Stickers Layer */
        .floating-stickers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .sticker {
            position: absolute;
            opacity: 0;
            animation: floatUp 12s infinite linear;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            20% { opacity: 0.3; }
            80% { opacity: 0.3; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        .niche-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 900px;
            padding: 50px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 32px;
            backdrop-filter: blur(20px);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* Hero Styling */
        .active-badge {
            background: linear-gradient(90deg, var(--accent), #a855f7);
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero-title span {
            display: block;
            background: linear-gradient(to bottom, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-section p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 45px;
        }

        /* Grid Layout */
        .niche-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .niche-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 35px 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .niche-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #475569;
            transition: 0.3s ease;
        }

        .niche-card h4 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0;
            color: #cbd5e1;
        }

        .niche-card:hover {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-8px);
        }

        .niche-card.selected {
            background: var(--accent-glow);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        .niche-card.selected i {
            color: var(--accent);
        }

        .niche-card.selected h4 {
            color: #fff;
        }

        .btn-finalize {
            background: linear-gradient(45deg, var(--accent), #a855f7);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 18px;
            font-weight: 800;
            font-size: 1.2rem;
            transition: 0.4s;
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-finalize.active {
            opacity: 1;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body>

    <!-- Ambient Stickers Container -->
    <div class="floating-stickers" id="stickerContainer"></div>

    <div class="niche-container">
        <div class="header-section">
            <div class="active-badge">10+ Scholars Active</div>
            <h1 class="hero-title">Reach <span>Your Zenith</span></h1>
            <p>The elite collaboration engine for the next generation.</p>
        </div>

        <form action="{{ url_for('save_niche') }}" method="POST" id="nicheForm">
            <input type="hidden" name="selected_niche" id="nicheInput" required>
           
            <div class="niche-grid">
                <div class="niche-card" data-niche="Web Development">
                    <i class="fa-solid fa-layer-group"></i>
                    <h4>Full-Stack Dev</h4>
                </div>
                <div class="niche-card" data-niche="AI/ML">
                    <i class="fa-solid fa-microchip"></i>
                    <h4>AI / ML</h4>
                </div>
                <div class="niche-card" data-niche="Cloud Computing">
                    <i class="fa-solid fa-cloud"></i>
                    <h4>Cloud (Azure)</h4>
                </div>
                <div class="niche-card" data-niche="UI/UX Design">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <h4>UI/UX Design</h4>
                </div>
            </div>

            <button type="submit" class="btn-finalize" id="finalizeBtn" disabled>
                Finalize Profile →
            </button>
        </form>
    </div>

    <script>
        // 1. Selection Logic
        const cards = document.querySelectorAll('.niche-card');
        const hiddenInput = document.getElementById('nicheInput');
        const submitBtn = document.getElementById('finalizeBtn');

        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
               
                hiddenInput.value = card.getAttribute('data-niche');
                submitBtn.disabled = false;
                submitBtn.classList.add('active');
            });
        });

        // 2. Dynamic Floating Stickers
        const stickerContainer = document.getElementById('stickerContainer');
        const icons = ['fa-brain', 'fa-code', 'fa-rocket', 'fa-atom', 'fa-microchip', 'fa-terminal'];
        const colors = ['#6366f1', '#a855f7', '#ffffff', '#4f46e5'];

        function createSticker() {
            const sticker = document.createElement('i');
            const randomIcon = icons[Math.floor(Math.random() * icons.length)];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
           
            sticker.className = `fa-solid ${randomIcon} sticker`;
            sticker.style.left = Math.random() * 100 + 'vw';
            sticker.style.color = randomColor;
            sticker.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            sticker.style.animationDuration = (Math.random() * 5 + 10) + 's';
           
            stickerContainer.appendChild(sticker);

            // Cleanup
            setTimeout(() => { sticker.remove(); }, 15000);
        }

        // Spawn stickers continuously
        setInterval(createSticker, 1500);
    </script>
</body>
</html>
